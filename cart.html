<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng | Gốm sứ Chị Bờ Vai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="container header-flex">
            <a href="index.html" class="logo">Gốm sứ Chị Bờ Vai</a>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="shop.html">Cửa hàng</a></li>
                    <li><a href="about.html">Giới thiệu</a></li>
                    <li><a href="blog.html">Tin tức</a></li>
                    <li><a href="contact.html">Liên hệ</a></li>
                    <li><a href="cart.html" class="active"><i class="fas fa-shopping-cart"></i></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="cart-section">
        <div class="container">
            <h1 class="cart-title">Giỏ hàng của bạn</h1>

            <div class="cart-table-wrapper">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Giá</th>
                            <th>Số lượng</th>
                            <th>Tổng</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <div class="cart-item-info">
                                    <img src="https://via.placeholder.com/70" alt="Bát sứ họa tiết cổ">
                                    <span class="cart-item-name">Bát sứ họa tiết cổ</span>
                                </div>
                            </td>
                            <td class="price">250.000đ</td>
                            <td>
                                <input type="number" value="1" min="1" class="qty-input">
                            </td>
                            <td class="subtotal">250.000đ</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="cart-summary-wrapper">
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Tổng tiền:</span>
                        <span class="total-amount">250.000đ</span>
                    </div>
                    <button class="btn-checkout">Thanh toán ngay</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Gốm sứ Chị Bờ Vai. Sản phẩm thủ công tâm huyết.</p>
    </footer>

</body>
</html>
