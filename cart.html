<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng | Gốm sứ Chị Bờ Vai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* ===== TỔNG THẾ ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #F3E3D0; color: #333; line-height: 1.6; }
        .container { width: 90%; max-width: 1100px; margin: auto; }

        /* ===== HEADER (ĐÃ SỬA LỖI DÀN HÀNG) ===== */
        .site-header { 
            background: #1A3263; 
            padding: 15px 0; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }

        .header-flex { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .logo { 
            color: white; 
            font-weight: bold; 
            font-size: 20px; 
            text-decoration: none; 
        }

        /* Quan trọng: Ép ul dàn hàng ngang */
        .nav-menu { 
            display: flex !important; 
            list-style: none !important; 
            gap: 20px; 
            margin: 0; 
            padding: 0;
        }

        .nav-menu li {
            display: inline-block;
        }

        .nav-menu a { 
            color: white !important; /* Xóa màu tím lỗi */
            text-decoration: none; 
            font-size: 14px; 
            text-transform: uppercase; 
            font-weight: 500; 
            transition: 0.3s;
        }

        .nav-menu a:hover { color: #AACDDC !important; }

        /* ===== CART PAGE STYLES ===== */
        .cart-section { padding: 60px 0; }
        .cart-title { color: #1A3263; margin-bottom: 30px; text-align: center; font-size: 28px; }

        .cart-table-wrapper { 
            background: white; 
            border-radius: 10px; 
            overflow-x: auto; 
            padding: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
        }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #F3E3D0; color: #1A3263; }
        td { padding: 15px; border-bottom: 1px solid #eee; }

        .cart-item-info { display: flex; align-items: center; gap: 15px; }
        .cart-item-info img { width: 70px; height: 70px; object-fit: cover; border-radius: 5px; }
        .cart-item-name { font-weight: bold; color: #1A3263; }

        .qty-input { width: 50px; padding: 5px; text-align: center; border: 1px solid #ddd; }
        
        /* Tổng kết */
        .cart-summary { margin-top: 30px; display: flex; justify-content: flex-end; }
        .summary-box { background: white; padding: 25px; border-radius: 10px; width: 100%; max-width: 350px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; }
        
        .checkout-btn { 
            width: 100%; background: #1A3263; color: white; padding: 12px; border: none; 
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header-flex { flex-direction: column; gap: 15px; }
            .nav-menu { gap: 10px; flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container header-flex">
            <a href="index.html" class="logo">Gốm sứ Chị Bờ Vai</a>
            <nav>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="cart.html"><i class="fa-solid fa-cart-shopping"></i> Cart</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container cart-section">
        <h2 class="cart-title">Giỏ hàng của bạn</h2>
        <div class="cart-table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Sản phẩm</th>
                        <th>Giá</th>
                        <th>Số lượng</th>
                        <th>Tổng</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <div class="cart-item-info">
                                <img src="https://images.unsplash.com/photo-1578749556568-bc2c40e68b61?q=80&w=200" alt="Sản phẩm">
                                <span class="cart-item-name">Bát sứ họa tiết cổ</span>
                            </div>
                        </td>
                        <td>250.000đ</td>
                        <td><input type="number" value="1" class="qty-input"></td>
                        <td>250.000đ</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="cart-summary">
            <div class="summary-box">
                <div class="summary-row">
                    <span>Tổng tiền:</span>
                    <strong style="color: #1A3263;">250.000đ</strong>
                </div>
                <button class="checkout-btn">Thanh toán ngay</button>
            </div>
        </div>
    </main>

</body>
</html>
