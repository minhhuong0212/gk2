<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}
.product-card {
    border: 1px solid #eee;
    padding: 15px;
    text-align: center;
    border-radius: 10px;
}
.product-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}
.price { color: red; font-weight: bold; }
.btn-add-cart {
    margin-top: 10px;
    padding: 8px 12px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<header class="site-header">
<div class="container header-flex">
<div class="logo">Gốm sứ Chị Bờ Vai</div>

<ul class="nav-menu">
<li><a href="index.html">Trang chủ</a></li>
<li><a href="shop.html">Cửa hàng</a></li>
<li>
<a href="cart.html">
<i class="fa-solid fa-cart-shopping"></i>
(<span id="cart-count">0</span>)
</a>
</li>
</ul>
</div>
</header>

<div class="container">
<h2>Tất cả sản phẩm</h2>

<div class="product-grid">

<div class="product-card">
<img src="https://cdn.hstatic.net/products/200000532849/112776296-sm-01_30a70e09bcbf43f4850a7f341d4e3566_large.png">
<h3>Bình Hoa</h3>
<p class="price">350.000đ</p>
<button class="btn-add-cart" data-name="Bình Hoa" data-price="350000">Thêm vào giỏ</button>
</div>

<div class="product-card">
<img src="https://cdn.hstatic.net/products/200000532849/012803856203-sm-01_6abf2ccf291d4b859bcc83ead0a0d19f_large.png">
<h3>Ấm trà</h3>
<p class="price">480.000đ</p>
<button class="btn-add-cart" data-name="Ấm trà" data-price="480000">Thêm vào giỏ</button>
</div>

<div class="product-card">
<img src="https://product.hstatic.net/200000532849/product/80_1_4c2af0ddd6b8430bb004cae5349cfd0e_large.png">
<h3>Đĩa trái cây</h3>
<p class="price">180.000đ</p>
<button class="btn-add-cart" data-name="Đĩa trái cây" data-price="180000">Thêm vào giỏ</button>
</div>

</div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function updateCartCount() {
document.getElementById("cart-count").innerText = cart.length;
}

document.querySelectorAll(".btn-add-cart").forEach(btn => {
btn.onclick = () => {
let item = {
name: btn.dataset.name,
price: Number(btn.dataset.price),
qty: 1
};

cart.push(item);
localStorage.setItem("cart", JSON.stringify(cart));
updateCartCount();
alert("Đã thêm vào giỏ 🛒");
};
});

updateCartCount();
</script>

</body>
</html>
